<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter the passcode</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  .card {
    background: #16213e;
    padding: 2.5rem;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    max-width: 420px;
    width: 90%;
    text-align: center;
  }
  h1 { font-size: 1.3rem; margin-bottom: 0.5rem; }
  p.prompt { color: #aaa; margin-bottom: 1.5rem; }
  input {
    width: 100%;
    box-sizing: border-box;
    padding: 0.75rem;
    font-size: 1.1rem;
    border-radius: 8px;
    border: 2px solid #333;
    background: #0f0f23;
    color: #eee;
    text-align: center;
    letter-spacing: 0.15em;
  }
  input:focus { outline: none; border-color: #e94560; }
  button {
    margin-top: 1rem;
    padding: 0.75rem 2rem;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: #e94560;
    color: white;
    cursor: pointer;
    width: 100%;
  }
  button:hover { background: #d63851; }
  #result {
    margin-top: 1.25rem;
    min-height: 1.5rem;
    font-size: 1rem;
    white-space: pre-wrap;
  }
  #result.wrong { color: #ff8080; }
  #result.right { color: #7ee787; }
</style>
</head>
<body>
  <div class="card">
    <h1>Enter the passcode</h1>
    <p class="prompt">What is the four-digit code?</p>
    <input type="text" id="guess" autocomplete="off" autocapitalize="off" spellcheck="false"
           placeholder="Enter code..." />
    <button onclick="checkGuess()">Submit</button>
    <div id="result"></div>
  </div>

<script>
const ENTRIES = [{"hash": "9d1de19818e99a11d5bbd6a1b1c9ed92cafa03c0130bd24be87780621c9d4749", "type": "redirect", "target": "https://app.notion.com/p/Exhibit-A-394fc3fda6d580c18026f3f7557aeb8c"}, {"hash": "2fa929d49a80e817505e2e615cdf1845c410c53247af9a8075b45620044e4a12", "type": "message", "target": "Nice try, but no."}, {"hash": "888df25ae35772424a560c7152a1de794440e0ea5cfee62828333a456a506e05", "type": "message", "target": "Getting warmer..."}];
const WRONG_MESSAGE = "Incorrect. Try again.";
const NORMALIZE = "upper";

async function sha256Hex(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function normalize(s) {
  s = s.trim();
  if (NORMALIZE === "upper") return s.toUpperCase();
  if (NORMALIZE === "lower") return s.toLowerCase();
  return s;
}

async function checkGuess() {
  const raw = document.getElementById("guess").value;
  const normalized = normalize(raw);
  const hash = await sha256Hex(normalized);
  const resultEl = document.getElementById("result");
  const match = ENTRIES.find(e => e.hash === hash);
  if (match) {
    resultEl.className = "right";
    if (match.type === "redirect") {
      resultEl.textContent = "Correct! Redirecting...";
      setTimeout(() => { window.location.href = match.target; }, 700);
    } else {
      resultEl.textContent = match.target;
    }
  } else {
    resultEl.className = "wrong";
    resultEl.textContent = WRONG_MESSAGE;
  }
}

document.getElementById("guess").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkGuess();
});
</script>
</body>
</html>
